<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="status-dot"></span>
                <h1>VPN Dashboard</h1>
            </div>
            <span class="auto-badge" id="auto-status">自动切换</span>
        </div>
        <nav class="header-right">
            <button class="btn-primary" id="toggle-auto-btn" onclick="toggleAuto()">
                切换模式
            </button>
        </nav>
    </header>

    <main class="main">
        <!-- Top Row: Current Status + Chart -->
        <div class="grid grid-2">
            <!-- Current Node Panel -->
            <div class="panel panel-current">
                <div class="panel-header">
                    <span class="panel-title">当前连接</span>
                    <span class="last-switch" id="last-switch">--</span>
                </div>
                <div class="panel-body">
                    <!-- Hero Connection Card -->
                    <div class="connection-hero">
                        <div class="hero-flag-container">
                            <span class="hero-flag" id="current-flag">🌐</span>
                            <div class="hero-status-dot" id="hero-status-dot"></div>
                        </div>
                        <div class="hero-info">
                            <div class="hero-location" id="current-location">检测中...</div>
                            <div class="hero-meta">
                                <span class="hero-ip" id="current-ip">--</span>
                                <span class="hero-sep">•</span>
                                <span class="hero-node" id="current-node-name">--</span>
                            </div>
                        </div>
                        <div class="hero-score" id="hero-score-container">
                            <span class="score-value" id="current-score">--</span>
                            <span class="score-label">评分</span>
                        </div>
                    </div>

                    <!-- Metrics Row -->
                    <div class="metrics-row">
                        <div class="metric-item" id="metric-delay">
                            <div class="metric-icon delay-icon"></div>
                            <div class="metric-data">
                                <span class="metric-value" id="current-delay">--</span>
                                <span class="metric-unit">ms</span>
                            </div>
                            <span class="metric-label">延迟</span>
                        </div>
                        <div class="metric-item" id="metric-loss">
                            <div class="metric-icon loss-icon"></div>
                            <div class="metric-data">
                                <span class="metric-value" id="current-loss">--</span>
                                <span class="metric-unit">%</span>
                            </div>
                            <span class="metric-label">丢包</span>
                        </div>
                        <div class="metric-item" id="metric-jitter">
                            <div class="metric-icon jitter-icon"></div>
                            <div class="metric-data">
                                <span class="metric-value" id="current-jitter">--</span>
                                <span class="metric-unit">ms</span>
                            </div>
                            <span class="metric-label">抖动</span>
                        </div>
                        <div class="metric-item" id="metric-bandwidth">
                            <div class="metric-icon bandwidth-icon"></div>
                            <div class="metric-data">
                                <span class="metric-value" id="current-bandwidth">--</span>
                                <span class="metric-unit">Mbps</span>
                            </div>
                            <span class="metric-label">带宽</span>
                        </div>
                        <div class="metric-item" id="metric-dns">
                            <div class="metric-icon dns-icon"></div>
                            <div class="metric-data">
                                <span class="metric-value dns-value" id="current-dns">--</span>
                            </div>
                            <span class="metric-label">DNS</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Latency Chart Panel -->
            <div class="panel panel-chart">
                <div class="panel-header">
                    <span class="panel-title">延迟趋势</span>
                    <span class="chart-legend">
                        <span class="legend-item"><span class="legend-dot good"></span>优秀</span>
                        <span class="legend-item"><span class="legend-dot warning"></span>一般</span>
                        <span class="legend-item"><span class="legend-dot bad"></span>较差</span>
                    </span>
                </div>
                <div class="panel-body">
                    <div class="chart-container">
                        <canvas id="latencyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Node List Panel -->
        <div class="panel panel-nodes">
            <div class="panel-header">
                <span class="panel-title">节点列表</span>
                <div class="panel-actions">
                    <span class="eval-status" id="eval-status">评估中...</span>
                    <button class="btn-small" onclick="refreshNodes()">刷新</button>
                </div>
            </div>
            <div class="panel-body">
                <div id="node-cards" class="nodes-table-container">
                    <table class="nodes-table">
                        <thead>
                            <tr>
                                <th>节点</th>
                                <th>延迟</th>
                                <th>丢包</th>
                                <th>抖动</th>
                                <th>DNS</th>
                                <th>带宽</th>
                                <th>评分</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="nodes-tbody">
                            <tr class="loading-row">
                                <td colspan="9">
                                    <div class="loading-spinner"></div>
                                    <span>正在评估所有节点...</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Chart instance
        let latencyChart = null;

        // Initialize chart with new styling
        function initChart() {
            const ctx = document.getElementById('latencyChart').getContext('2d');

            // Create gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, 200);
            gradient.addColorStop(0, 'rgba(0, 240, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 240, 255, 0)');

            latencyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '延迟 (ms)',
                        data: [],
                        borderColor: '#00f0ff',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        pointHoverBackgroundColor: '#00f0ff',
                        pointHoverBorderColor: '#fff',
                        pointHoverBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            display: false
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(30, 45, 77, 0.5)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#4a5a7a',
                                font: { family: 'JetBrains Mono', size: 10 },
                                padding: 8
                            }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    animation: {
                        duration: 750,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        // Fetch current node data
        async function fetchCurrent() {
            try {
                const response = await fetch('/api/current');
                const data = await response.json();

                // Update location display
                if (data.ip_info) {
                    document.getElementById('current-flag').textContent = data.ip_info.flag;
                    document.getElementById('current-location').textContent = data.ip_info.location;
                    document.getElementById('current-ip').textContent = data.ip_info.ip;
                }

                // Update node name
                document.getElementById('current-node-name').textContent = data.node || 'Unknown';

                // Update metrics
                const metrics = data.metrics;
                document.getElementById('current-delay').textContent = metrics.delay ? metrics.delay.toFixed(0) : '--';
                document.getElementById('current-loss').textContent = metrics.packet_loss !== undefined ? metrics.packet_loss.toFixed(1) : '--';
                document.getElementById('current-jitter').textContent = metrics.jitter !== undefined ? metrics.jitter.toFixed(1) : '--';
                document.getElementById('current-bandwidth').textContent = metrics.bandwidth !== undefined && metrics.bandwidth !== null ? metrics.bandwidth.toFixed(1) : '--';
                document.getElementById('current-dns').textContent = metrics.dns !== undefined && metrics.dns !== null ? metrics.dns : '--';
                document.getElementById('current-score').textContent = metrics.score !== undefined ? metrics.score.toFixed(0) : '--';

                // Update hero status dot
                const statusDot = document.getElementById('hero-status-dot');
                statusDot.className = 'hero-status-dot ' + (metrics.status || '');

                // Update metric cards
                updateMetricCard('metric-delay', metrics.delay, 100, 300);
                updateMetricCard('metric-loss', metrics.packet_loss, 1, 5);
                updateMetricCard('metric-jitter', metrics.jitter, 20, 50);

                // Update auto badge
                const autoBadge = document.getElementById('auto-status');
                if (data.auto_mode) {
                    autoBadge.classList.remove('disabled');
                    autoBadge.textContent = '自动切换';
                } else {
                    autoBadge.classList.add('disabled');
                    autoBadge.textContent = '手动模式';
                }

                // Update last switch time
                document.getElementById('last-switch').textContent = '切换: ' + data.last_switch;

            } catch (e) {
                console.error('Failed to fetch current:', e);
            }
        }

        function updateMetricCard(id, value, goodThreshold, badThreshold) {
            const card = document.getElementById(id);
            if (value === undefined || value === null || value === '--') {
                card.className = 'metric-item';
                return;
            }
            if (value < goodThreshold) {
                card.className = 'metric-item good';
            } else if (value < badThreshold) {
                card.className = 'metric-item warning';
            } else {
                card.className = 'metric-item bad';
            }
        }

        // Fetch node list
        async function fetchNodes() {
            try {
                const response = await fetch('/api/nodes');
                const data = await response.json();

                const tbody = document.getElementById('nodes-tbody');

                // Handle evaluating status
                if (data.status === "evaluating" || !data.nodes || data.nodes.length === 0) {
                    tbody.innerHTML = `
                        <tr class="loading-row">
                            <td colspan="9">
                                <div class="loading-spinner"></div>
                                <span>${data.message || '正在评估所有节点...'}</span>
                            </td>
                        </tr>
                    `;
                    document.getElementById('eval-status').textContent = '评估中...';
                    return;
                }

                const nodes = data.nodes;

                tbody.innerHTML = nodes.map((node, index) => {
                    const isCurrent = node.is_current;
                    const statusClass = node.status;
                    const statusText = { good: '优秀', warning: '一般', bad: '较差' }[node.status] || '未知';

                    return `
                        <tr class="${isCurrent ? 'current' : ''} ${statusClass}" style="animation-delay: ${Math.min(index * 20, 300)}ms">
                            <td class="node-name-cell">
                                ${isCurrent ? '<span class="current-badge">当前</span>' : ''}
                                <span class="node-name-text">${node.name}</span>
                            </td>
                            <td class="metric-cell ${node.delay_ms < 100 ? 'good' : node.delay_ms < 300 ? 'warning' : 'bad'}">${node.delay_ms.toFixed(0)} ms</td>
                            <td class="metric-cell ${node.packet_loss < 1 ? 'good' : node.packet_loss < 5 ? 'warning' : 'bad'}">${node.packet_loss.toFixed(1)}%</td>
                            <td class="metric-cell ${node.jitter_ms < 20 ? 'good' : node.jitter_ms < 50 ? 'warning' : 'bad'}">${node.jitter_ms.toFixed(1)} ms</td>
                            <td class="metric-cell">${node.dns_server || '--'}</td>
                            <td class="metric-cell ${node.bandwidth_mbps ? (node.bandwidth_mbps > 50 ? 'good' : node.bandwidth_mbps > 20 ? 'warning' : 'bad') : ''}">${node.bandwidth_mbps ? node.bandwidth_mbps.toFixed(1) + ' Mbps' : '--'}</td>
                            <td class="score-cell">${node.score.toFixed(0)}</td>
                            <td class="status-cell"><span class="status-badge ${statusClass}">${statusText}</span></td>
                            <td class="action-cell">
                                ${!isCurrent ? `<button class="btn-switch" onclick="switchToNode('${node.name}')">切换</button>` : '<span class="current-text">使用中</span>'}
                            </td>
                        </tr>
                    `;
                }).join('');

                // Update evaluation status
                document.getElementById('eval-status').textContent = `${data.count || nodes.length} 节点`;
                document.getElementById('eval-status').classList.add('ready');

            } catch (e) {
                console.error('Failed to fetch nodes:', e);
            }
        }

        // Fetch history for chart
        async function fetchHistory() {
            try {
                const response = await fetch('/api/history');
                const history = await response.json();

                if (latencyChart && history.length > 0) {
                    // Take last 30 points
                    const recent = history.slice(-30);
                    latencyChart.data.labels = recent.map((_, i) => i);
                    latencyChart.data.datasets[0].data = recent.map(h => h.delay);
                    latencyChart.update('none');
                }
            } catch (e) {
                console.error('Failed to fetch history:', e);
            }
        }

        // Switch to node
        async function switchToNode(nodeName) {
            try {
                const btn = event.target;
                btn.disabled = true;
                btn.textContent = '切换...';

                const response = await fetch(`/api/switch/${encodeURIComponent(nodeName)}`, {
                    method: 'POST'
                });

                const result = await response.json();

                if (result.success) {
                    btn.textContent = '成功';
                    setTimeout(() => {
                        fetchCurrent();
                        fetchNodes();
                    }, 1000);
                } else {
                    btn.textContent = '失败';
                    btn.disabled = false;
                }
            } catch (e) {
                console.error('Switch failed:', e);
                event.target.textContent = '失败';
                event.target.disabled = false;
            }
        }

        // Toggle auto mode
        async function toggleAuto() {
            try {
                const response = await fetch('/api/toggle-auto');
                const data = await response.json();

                const autoBadge = document.getElementById('auto-status');
                const btn = document.getElementById('toggle-auto-btn');

                if (data.enabled) {
                    autoBadge.classList.remove('disabled');
                    autoBadge.textContent = '自动切换';
                    btn.textContent = '切换模式';
                } else {
                    autoBadge.classList.add('disabled');
                    autoBadge.textContent = '手动模式';
                    btn.textContent = '切换模式';
                }
            } catch (e) {
                console.error('Toggle auto failed:', e);
            }
        }

        // Refresh nodes
        function refreshNodes() {
            fetchNodes();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            fetchCurrent();
            fetchNodes();
            fetchHistory();

            // Set up polling
            setInterval(fetchCurrent, 5000);
            setInterval(fetchNodes, 30000);
            setInterval(fetchHistory, 10000);
        });
    </script>
</body>
</html>
